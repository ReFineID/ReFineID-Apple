# SwiftLint -- the defect/quality lint layer for every Swift source in this
# repository. The gate is `swiftlint lint` with `strict: true` below: every
# finding is an error and findings are driven to zero.
#
# Ported from the reference implementation's proven configuration. Why not
# `--enable-all-rules`? It ignores `disabled_rules` and config, so it cannot
# honour the carve register below. Instead every opt-in rule is enumerated;
# combined with the default rule set this is "all rules on, minus what is
# truly impossible" (verified complete against SwiftLint 0.65.0).
#
# Carve register -- opt-in rules deliberately OMITTED, each justified:
#
#   Owned by swift-format (formatting is swift-format's job; a file cannot
#   satisfy both):
#     contrasted_opening_brace       swift-format emits K&R same-line braces
#     vertical_whitespace_between_cases  swift-format owns vertical whitespace
#     conditional_returns_on_newline swift-format keeps `guard ... else
#                          { return }`, the official early-exit idiom
#     multiline_arguments_brackets   swift-format owns multiline call bracket
#                          placement (close paren trails the last argument)
#   (Two more swift-format-owned layout rules are DEFAULT rules and so live
#   in `disabled_rules` below: opening_brace, closure_parameter_position.)
#
#   Framework / idiom mismatch:
#     prefer_nimble        tests use Swift Testing, not Nimble
#     nimble_operator      Nimble-only operator rule
#     prefixed_toplevel_constant   the k-prefix Apple abandoned in Swift 3;
#                          contradicts AlwaysUseLowerCamelCase
#
#   Mutually exclusive with a kept rule:
#     explicit_type_interface  directly contradicts redundant_type_annotation;
#                          we keep the idiomatic rule (let inference work)
#
#   Counterproductive:
#     required_deinit      a leak-debugging rule; forcing an empty deinit on
#                          every class conflicts with no_empty_block and adds
#                          no safety. Off by necessity, not preference.
#
# Analyzer rules (capture_variable, explicit_self, typesafe_array_init,
# unused_declaration, unused_import) need `swiftlint analyze` with a compile
# database, not `lint`; they are tracked as future gate work, not enabled
# here.

strict: true

# "Master File" (MF) is normative ISO 7816-4 protocol vocabulary - the
# root of every smart card's file system. Allow it as a domain term;
# the rule's other flagged terms stay in force.
inclusive_language:
  override_allowed_terms:
    - master

indentation_width:
  indentation_width: 2

trailing_comma:
  mandatory_comma: true

# Typing discipline (Documentation/typing-discipline.md), mechanically enforced:
custom_rules:
  # A domain value must not be smuggled across an API boundary as a raw byte
  # bag. `Data` / `String` are too broadly legitimate (wire I/O, text, URLs)
  # to ban; only the raw [UInt8] byte bag is. The ONE sanctioned raw boundary
  # is a domain type's own validating initializer / byte accessor; those
  # files form the exception register below (kept minimal, justified,
  # reviewed).
  raw_byte_array_in_api:
    name: "Raw [UInt8] across an API boundary"
    regex: '(?:func|init)\b[^{}\n]*\[UInt8\]'
    excluded:
      # ZeroizingDigitStore is the module's sanctioned bytes<->credential
      # boundary: its validating initializer is where entered digits become
      # owned, zeroized storage.
      - ".*/ZeroizingDigitStore\\.swift"
      # ApplicationIdentifier owns its bytes<->AID boundary: the validating
      # hex parser and the private validated-bytes initializer.
      - ".*/ApplicationIdentifier\\.swift"
      # EcdsaSignature owns the raw-r||s <-> X9.62-DER boundary: it
      # re-encodes card signature bytes and does no cryptography.
      - ".*/EcdsaSignature\\.swift"
      # Test fixtures build raw bytes; the boundary rule is about shipped API.
      - ".*/Tests/.*"
    message: >
      A function takes or returns a raw [UInt8] across an API boundary.
      Wrap it in a domain type so strong typing is not discarded at the
      boundary -- the only sanctioned raw boundary is a domain type's own
      validating initializer. See Documentation/typing-discipline.md.
    severity: error

  # Release plan section 4.4: every protocol value has a meaningful named
  # definition. No unexplained hex literal in production source, test
  # source, or documentation examples. Wire fixtures belong in dedicated,
  # provenance-marked test-vector files, which are the only sanctioned home
  # for hex and are added to the exception register when they exist.
  unexplained_hex:
    name: "Unexplained hex literal"
    regex: '\b0x[0-9A-Fa-f_]+\b'
    excluded:
      # The dedicated named-protocol-value home: every hex literal there
      # is a named, documented constant (release plan section 4.4).
      - ".*/CardCore/Sources/CardCore/Values/.*"
      # EcdsaSignature's DER tags/masks are named, documented constants
      # at the card-signature-format boundary.
      - ".*/EcdsaSignature\\.swift"
      # Test sources use hex literals for wire vectors and expected
      # status words; the rule is about shipped protocol source.
      - ".*/Tests/.*"
      # Provenance-marked wire fixtures (none yet). Example:
      # - ".*/TestVectors/.*"
      - ".*/TestVectors/.*"
    message: >
      Hex literals are allowed only inside named protocol-value definitions
      in dedicated files or provenance-marked test-vector files. Give the
      value a named, documented home. See Documentation/release-plan.md section 4.4.
    severity: error

# Default rules carved because swift-format owns the layout they police:
# swift-format puts the opening brace on its own line when a signature
# wraps, and it wraps a long closure signature onto the line after `{`.
disabled_rules:
  - opening_brace
  - closure_parameter_position

