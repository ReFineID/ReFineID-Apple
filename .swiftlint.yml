# Build artefacts and authoring-time generator scripts are excluded;
# everything that ships is in scope. Scripts/ holds tooling that runs on
# the developer machine only (icon generation, gates) and is reviewed as
# tooling, not as product code.
excluded:
  - "**/.build"
  - "**/.swiftpm"
  - "DerivedData"
  - "Scripts"
